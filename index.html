<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CritRoll - DND Dice Room</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/jpeg" href="logo.png">

    <style>
        /* ================= CSS ================= */
        :root { 
            --primary: #e74c3c; 
            --bg: #1a1a1a; 
            --parchment: #f3e5ab; 
            --ink: #2c1e16;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            /* שרשרת פונטים חסינה למחשב ונייד */
            font-family: 'Assistant', 'Segoe UI', Arial, sans-serif !important;
        }

        body { 
            color: white; 
            margin: 0; 
            overflow: hidden; 
            height: 100dvh; 
            background-color: #2c1e16; 
            background-image: url('https://as2.ftcdn.net/jpg/03/19/51/81/1000_F_319518163_MFy3GSyG5d382jMYkeiqa3rhixvrUX6h.jpg'); 
            background-size: cover; 
            background-position: center; 
        }

        #login-screen { 
            position: fixed; 
            inset: 0; 
            background: rgba(44, 62, 80, 0.95); 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            backdrop-filter: blur(10px);
        }

        .login-card { 
            background: #34495e; 
            padding: 25px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 350px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .login-card input[type="text"], .role-select { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: none; 
            font-size: 16px; 
            text-align: center; 
            background: white;
            color: #333;
        }

        .color-picker-section { text-align: center; padding: 5px 0; }
        .picker-label { color: white; display: block; margin-bottom: 12px; font-size: 14px; }
        .palette-grid { display: flex; justify-content: center; gap: 12px; }

        .color-opt {
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3); transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); flex-shrink: 0;
        }

        .color-opt.active { transform: scale(1.25); border-color: white; box-shadow: 0 0 12px rgba(255,255,255,0.6); }

        .role-select { background: #2c3e50; color: white; cursor: pointer; }

        .main-join-btn {
            width: 100%; padding: 15px; background: var(--primary); color: white; border: none;
            border-radius: 8px; font-weight: 800; font-size: 18px; cursor: pointer;
            box-shadow: 0 4px 0 #a93226; transition: all 0.1s;
        }

        #game-screen { display: none; height: 100%; flex-direction: row; }

        #side-panel { 
            width: 260px; background: rgba(17, 17, 17, 0.85); border-left: 2px solid #333; 
            display: flex; flex-direction: column; padding: 15px; flex-shrink: 0; backdrop-filter: blur(8px); 
        }

        .side-logo { width: 100%; max-width: 150px; margin: 0 auto 20px; display: block; filter: drop-shadow(0 0 10px rgba(231,76,60,0.5)); }

        .side-btn { 
            background: #2c3e50; color: white; border: none; padding: 10px; border-radius: 6px; 
            cursor: pointer; font-size: 13px; font-weight: bold; width: 100%; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); transition: background 0.2s;
        }
        .side-btn:hover { background: #34495e; }
        #reset-init-btn { background: #8B0000; }

        .tracker-item {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 12px; border-radius: 6px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center; font-size: 14px;
        }
        .init-score { font-weight: 900; color: #f3e5ab; font-size: 16px; }

        #main-area { flex-grow: 1; display: flex; flex-direction: column; position: relative; }

        #log-container { 
            position: absolute; top: 15px; left: 15px; width: 320px; 
            background-color: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            color: var(--ink); padding: 15px; border-radius: 8px; text-align: right; 
            box-shadow: 5px 10px 25px rgba(0,0,0,0.5); font-size: 13px; 
            max-height: 45%; overflow-y: auto; z-index: 90; border: 2px solid #d4c38d;
        }
        .log-header { font-weight: 900; border-bottom: 2px solid rgba(0,0,0,0.2); padding-bottom: 8px; margin-bottom: 12px; font-size: 16px; color: #5d4037;}

        .log-player-name {
            color: #ffffff !important;
            font-weight: 800 !important;
            font-size: 1.15em;
            letter-spacing: 0.5px;
            display: inline-block;
        }

        #dice-stage { flex-grow: 1; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        
        .dice-container { position: relative; width: 200px; height: 200px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.6)); }
        #dice-svg { width: 100%; height: 100%; }
        #result-text { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 48px; font-weight: 900; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            opacity: 0; transition: opacity 0.3s;
        }
        #result-text.show { opacity: 1; }

        @keyframes rollShake {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-15deg) scale(1.1); }
            50% { transform: rotate(15deg) scale(0.9); }
            75% { transform: rotate(-10deg) scale(1.05); }
            100% { transform: rotate(0deg) scale(1); }
        }
        .shake { animation: rollShake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes critGlow { 0% { filter: drop-shadow(0 0 10px #B8860B); } 50% { filter: drop-shadow(0 0 50px #FFD700); } 100% { filter: drop-shadow(0 0 10px #B8860B); } }
        .crit-glow { animation: critGlow 2s infinite; }

        #controls { 
            background: rgba(26, 26, 26, 0.95); padding: 20px; border-top: 2px solid #333; 
            display: flex; justify-content: center; gap: 15px; align-items: center; flex-wrap: wrap; backdrop-filter: blur(10px);
        }

        .dice-btn { 
            background: #2c3e50; color: white; border: 2px solid rgba(255,255,255,0.1); 
            border-radius: 12px; width: 60px; height: 60px; font-size: 18px; font-weight: 800; 
            cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .dice-btn:hover { background: var(--primary); transform: translateY(-3px); border-color: white; }

        .special-roll-btn { 
            background: #34495e; color: white; border: 1px solid rgba(255,255,255,0.2); 
            padding: 0 15px; height: 60px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        
        .mod-container { display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 12px; border: 1px solid #333; }
        #mod-input { width: 50px; text-align: center; background: transparent; border: none; color: white; font-size: 24px; font-weight: bold; outline: none; }
        #init-btn { background: #e67e22; height: 60px; width: 60px; border-radius: 12px; border: none; color: white; font-size: 24px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #init-btn:hover { background: #d35400; transform: scale(1.05); }

        /* --- קולדאון מובנה --- */
        .cooldown-active {
            filter: grayscale(100%) !important;
            opacity: 0.4 !important;
            cursor: not-allowed !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body id="main-body">

    <div id="login-screen">
        <img src="logo.png" alt="CritRoll Logo" class="main-logo" style="width: 200px; margin-bottom: 20px;">
        <div class="login-card">
            <input type="text" id="player-name" placeholder="שם השחקן" autocomplete="off">
            <input type="text" id="char-name" placeholder="שם הדמות" autocomplete="off">

            <div class="color-picker-section">
                <span class="picker-label">בחר צבע דיו:</span>
                <div id="color-palette" class="palette-grid">
                    <div class="color-opt active" data-color="#8B0000" style="background:#8B0000;"></div>
                    <div class="color-opt" data-color="#006400" style="background:#006400;"></div>
                    <div class="color-opt" data-color="#000080" style="background:#000080;"></div>
                    <div class="color-opt" data-color="#B8860B" style="background:#B8860B;"></div>
                    <div class="color-opt" data-color="#4B0082" style="background:#4B0082;"></div>
                    <div class="color-opt" data-color="#2F4F4F" style="background:#2F4F4F;"></div>
                </div>
                <input type="hidden" id="user-color" value="#8B0000">
            </div>

            <div class="role-section">
                <select id="user-role" class="role-select">
                    <option value="player">שחקן</option>
                    <option value="dm">שליט מבוך (DM)</option>
                </select>
            </div>

            <button id="join-btn" class="main-join-btn">הצטרף למשחק</button>
        </div>
    </div>

    <div id="game-screen">
        <div id="side-panel">
            <img src="logo.png" alt="Small Logo" class="side-logo">
            <h3 style="margin:0 0 10px 0; font-size: 16px;">סדר יוזמה</h3>
            <div id="init-list"></div>
            <div style="margin-top:auto; display:flex; flex-direction:column; gap:5px;">
                <div style="font-size:11px; opacity:0.5;">מחוברים: <span id="online-count">0</span></div>
                <button id="reset-init-btn" class="side-btn">איפוס קרב (DM)</button>
                <button id="mute-btn" class="side-btn">🔇 השתק</button>
            </div>
        </div>

        <div id="main-area">
            <div id="log-container">
                <div class="log-header">לוג הטלות:</div>
                <div id="roll-log"></div>
            </div>

            <div id="dice-stage">
                <div id="dice-visual" class="dice-container" style="display: none;">
                    <svg id="dice-svg" viewBox="0 0 100 100"></svg>
                    <div id="result-text"></div>
                </div>
                <div id="empty-state" style="color:#555; font-style: italic;">ממתין להטלה...</div>
            </div>

            <div id="controls">
                <div class="mod-container">
                    <span style="font-size: 14px; color: var(--parchment);">תוסף:</span>
                    <input type="number" id="mod-input" value="0">
                </div>
                
                <button class="dice-btn" data-type="d4">D4</button>
                <button class="dice-btn" data-type="d6">D6</button>
                <button class="dice-btn" data-type="d8">D8</button>
                <button class="dice-btn" data-type=\"d10\">D10</button>
                <button class="dice-btn" data-type="d12">D12</button>
                <button class="dice-btn" data-type="d20">D20</button>
                
                <button id="adv-btn" class="special-roll-btn adv">יתרון</button>
                <button id="dis-btn" class="special-roll-btn dis">חיסרון</button>
                <button id="init-btn" title="גלגל יוזמה">⚡</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, onDisconnect, onValue, remove, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // --- Constants ---
        const firebaseConfig = {
            apiKey: "AIzaSyBmKG3lCfoHK4bTdjUFSMR2YLmgbXtTmbM",
            authDomain: "dnd-dice-room.firebaseapp.com",
            databaseURL: "https://dnd-dice-room-default-rtdb.firebaseio.com",
            projectId: "dnd-dice-room",
            storageBucket: "dnd-dice-room.firebasestorage.app",
            messagingSenderId: "365914207851", 
            appId: "1:365914207851:web:777478485eabf5bf1f632e"
        };

        const diceShapes = {
            d4: '<polygon points="50,5 95,85 5,85" stroke="black" fill-opacity="0.95"/>',
            d6: '<rect x="15" y="15" width="70" height="70" rx="8" stroke="black" fill-opacity="0.95"/>',
            d8: '<polygon points="50,5 90,50 50,95 10,50" stroke="black" fill-opacity="0.95"/>',
            d10: '<polygon points="50,5 95,45 50,95 5,45" stroke="black" fill-opacity="0.95"/>',
            d12: '<polygon points="50,5 95,35 75,90 25,90 5,35" stroke="black" fill-opacity="0.95"/>',
            d20: '<polygon points="50,5 95,25 75,85 25,85 5,25" stroke="black" fill-opacity="0.95"/>'
        };

        // --- Audio ---
        const rollSound = new Audio('./dice.mp3');
        const critSound = new Audio('./crit.mp3');
        const failSound = new Audio('./fail.mp3');

        function stopAllSounds() {
            [rollSound, critSound, failSound].forEach(s => { s.pause(); s.currentTime = 0; });
        }

        function unlockAudio() {
            [rollSound, critSound, failSound].forEach(s => {
                s.muted = true;
                s.play().then(() => { s.pause(); s.currentTime = 0; s.muted = false; }).catch(() => {});
            });
        }

        function playRollSound(type, res, isMuted) {
            if (isMuted) return;
            stopAllSounds();
            if (type === 'd20' && res === 20) critSound.play().catch(() => {});
            else if (type === 'd20' && res === 1) failSound.play().catch(() => {});
            else rollSound.play().catch(() => {});
        }

        // --- Messages ---
        const getRandomMsg = (msgs) => msgs[Math.floor(Math.random() * msgs.length)];
        function getFlavorText(type, res, total, maxVal) {
            if (type === 'd20') {
                if (res === 20) return getRandomMsg(["האלים מריעים לך! 🌟", "פגיעה קטלנית!", "אגדה נולדה!", "היסטוריה נכתבת ב-20 טבעי!"]);
                if (res === 1) return getRandomMsg(["זה הולך לכאוב... 💀", "יום רע להיות הרפתקן.", "החרב החליקה?", "הכישלון הזה ייזכר לדורות..."]);
                if (total >= 25) return getRandomMsg(["מעשה גבורה שייכתב בדברי הימים!", "עוצמה שלא מהעולם הזה!", "האויב נראה המום מהפגיעה!"]);
                if (total >= 18) return getRandomMsg(["מכה מרשימה ביותר!", "ביצוע של מקצוען אמיתי.", "האימונים השתלמו ברגע האמת."]);
                if (total >= 12) return getRandomMsg(["תוצאה סולידית, לא רע.", "זה יעשה את העבודה.", "פגיעה נקייה, העסק מתקדם."]);
                return getRandomMsg(["אולי כדאי לנסות שוב...", "כמעט פגעת בציפור שעברה שם.", "נשימה עמוקה ובפעם הבאה לכוון."]);
            } 
            if (total >= maxVal + 5) return getRandomMsg(["עוצמה מתפרצת!", "נזק שקשה לתאר!", "מרסק!"]);
            if (total >= maxVal - 1) return getRandomMsg(["מכה עוצמתית!", "יפה מאוד!", "השארת חותם."]);
            if (res === 1) return getRandomMsg(["שריטה קלה.", "בקושי מדגדג.", "אולי בפעם הבאה."]);
            return getRandomMsg(["נזק רגיל.", "מכה סטנדרטית.", "עושה את העבודה."]);
        }

        // --- UI Functions ---
        function updateModeUI(activeMode) {
            const advBtn = document.getElementById('adv-btn');
            const disBtn = document.getElementById('dis-btn');
            if (!advBtn || !disBtn) return;
            [advBtn, disBtn].forEach(btn => {
                btn.style.filter = "grayscale(100%)";
                btn.style.opacity = "0.4";
                btn.style.border = "1px solid rgba(255,255,255,0.2)";
            });
            if (activeMode === 'adv') {
                advBtn.style.filter = "grayscale(0%)";
                advBtn.style.opacity = "1";
                advBtn.style.border = "2px solid white";
            } else if (activeMode === 'dis') {
                disBtn.style.filter = "grayscale(0%)";
                disBtn.style.opacity = "1";
                disBtn.style.border = "2px solid white";
            }
        }

        function updateInitiativeUI(data) {
            const list = document.getElementById('init-list');
            if (!list || !data) return;
            list.innerHTML = "";
            const items = Object.keys(data).map(key => ({ name: key, ...data[key] }));
            items.sort((a, b) => b.score - a.score).forEach(i => {
                const div = document.createElement('div');
                div.className = 'tracker-item';
                div.style.borderRight = `4px solid ${i.color || '#e74c3c'}`;
                div.innerHTML = `<span style="font-weight:bold;">${i.name}</span><span class="init-score">${i.score}</span>`;
                list.appendChild(div);
            });
        }

        function addLogEntry(data, time, flavorText) {
            const log = document.getElementById('roll-log');
            if (!log) return;
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const userColor = data.color || '#8B0000';
            const modeLabel = data.mode === 'adv' ? '<span style="color:#2d4238; font-weight:bold;">(יתרון)</span>' : (data.mode === 'dis' ? '<span style="color:#8c5151; font-weight:bold;">(חיסרון)</span>' : '');

            entry.innerHTML = `
                <div style="margin-bottom: 15px; padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.1); background: rgba(0,0,0,0.02); border-radius: 8px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                         <span class="log-player-name" style="text-shadow: 0 0 12px ${userColor}, 0 0 20px ${userColor}aa;">
                            ${data.cName || 'גיבור'} (${data.pName || 'שחקן'})
                         </span>
                         <span style="color: #2c1e16; font-size: 11px; font-weight: bold; font-family: monospace;">[${time}]</span> 
                    </div>
                    <div style="color: #1a1a1a; margin-top: 4px; line-height: 1.4;">
                        הטיל <strong style="color: #000;">${data.type.toUpperCase()}</strong> ${modeLabel} וקיבל 
                        <span style="color: ${data.res === 20 ? '#B8860B' : (data.res === 1 ? '#e74c3c' : '#000')}; font-weight: 900; font-size: 1.3em;">
                            ${data.res + (data.mod || 0)}
                        </span>
                        <small style="color: #666; font-weight: bold;"> (${data.res}${data.mod >= 0 ? '+' : ''}${data.mod})</small>
                    </div>
                    ${flavorText ? `<div style="color: #5d4037; font-style: italic; font-size: 12px; margin-top: 6px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 4px;">"${flavorText}"</div>` : ""}
                </div>
            `;
            log.prepend(entry);
            if (log.children.length > 30) log.removeChild(log.lastChild);
        }

        // פונקציית הקולדאון המובנית
        function setDiceCooldown(isActive) {
            const buttons = document.querySelectorAll('.dice-btn, #init-btn, .special-roll-btn');
            buttons.forEach(btn => {
                if (isActive) {
                    btn.classList.add('cooldown-active');
                    btn.disabled = true;
                } else {
                    btn.classList.remove('cooldown-active');
                    btn.disabled = false;
                }
            });
        }

        // --- App Logic ---
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let pName = "", cName = "", pColor = "#8B0000", userRole = "player";
        let isMuted = false, isCooldown = false, canAnimate = false;
        let activeMode = 'normal'; 

        window.addEventListener('DOMContentLoaded', () => {
            const colorOptions = document.querySelectorAll('.color-opt');
            const colorInput = document.getElementById('user-color');

            const setActiveColor = (color) => {
                colorOptions.forEach(opt => {
                    if (opt.getAttribute('data-color') === color) {
                        colorOptions.forEach(o => o.classList.remove('active'));
                        opt.classList.add('active');
                        colorInput.value = color;
                        pColor = color;
                    }
                });
            };

            colorOptions.forEach(opt => opt.addEventListener('click', () => setActiveColor(opt.getAttribute('data-color'))));

            const savedPName = localStorage.getItem('critroll_pName');
            const savedCName = localStorage.getItem('critroll_cName');
            const savedColor = localStorage.getItem('critroll_pColor');
            const savedRole = localStorage.getItem('critroll_role');

            if (savedPName) document.getElementById('player-name').value = savedPName;
            if (savedCName) document.getElementById('char-name').value = savedCName;
            if (savedRole) document.getElementById('user-role').value = savedRole;
            if (savedColor) setActiveColor(savedColor);
        });

        document.getElementById('join-btn').onclick = () => {
            pName = document.getElementById('player-name').value.trim();
            cName = document.getElementById('char-name').value.trim();
            pColor = document.getElementById('user-color').value;
            userRole = document.getElementById('user-role').value;

            if (!pName || !cName) return alert("מלא פרטים!");

            localStorage.setItem('critroll_pName', pName);
            localStorage.setItem('critroll_cName', cName);
            localStorage.setItem('critroll_pColor', pColor);
            localStorage.setItem('critroll_role', userRole);

            unlockAudio(); 

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            
            document.getElementById('reset-init-btn').style.display = userRole === 'dm' ? 'block' : 'none';
            updateModeUI(activeMode);

            const userRef = ref(db, 'online/' + pName + '_' + cName);
            set(userRef, true);
            onDisconnect(userRef).remove();
            setTimeout(() => { canAnimate = true; }, 1000);
        };

        window.roll = (type, isInit = false) => {
            if (isCooldown && !isInit) return;
            const currentMode = isInit ? 'normal' : activeMode;

            if (!isInit) {
                isCooldown = true;
                setDiceCooldown(true); // מפעיל את העיצוב האפור ישירות מהקובץ הזה!
                setTimeout(() => { 
                    isCooldown = false; 
                    setDiceCooldown(false); 
                }, 3000);
            }

            const max = parseInt(type.replace('d', '')) || 20;
            const mod = parseInt(document.getElementById('mod-input').value) || 0;
            let res, res1 = null, res2 = null;

            if (currentMode === 'normal') {
                res = Math.floor(Math.random() * max) + 1;
            } else {
                res1 = Math.floor(Math.random() * max) + 1;
                res2 = Math.floor(Math.random() * max) + 1;
                res = (currentMode === 'adv') ? Math.max(res1, res2) : Math.min(res1, res2);
            }
            
            const rollData = { pName, cName, type, res, mod, color: pColor, mode: currentMode, ts: Date.now() };
            if (res1 !== null) rollData.res1 = res1;
            if (res2 !== null) rollData.res2 = res2;

            push(ref(db, 'rolls'), rollData);

            if (!isInit) {
                activeMode = 'normal';
                updateModeUI(activeMode);
            }
            return res + mod;
        };

        // Listeners
        document.getElementById('adv-btn').onclick = () => { activeMode = (activeMode === 'adv') ? 'normal' : 'adv'; updateModeUI(activeMode); };
        document.getElementById('dis-btn').onclick = () => { activeMode = (activeMode === 'dis') ? 'normal' : 'dis'; updateModeUI(activeMode); };
        document.getElementById('mute-btn').onclick = () => { isMuted = !isMuted; document.getElementById('mute-btn').innerText = isMuted ? "🔊 הפעל" : "🔇 השתק"; };
        document.getElementById('reset-init-btn').onclick = () => { if(confirm("לאפס יוזמה?")) remove(ref(db, 'initiative')); };
        document.querySelectorAll('.dice-btn').forEach(btn => { btn.onclick = () => window.roll(btn.getAttribute('data-type')); });
        document.getElementById('init-btn').onclick = () => { 
            const total = window.roll('d20', true); 
            set(ref(db, 'initiative/' + cName), { score: total, color: pColor, playerName: pName }); 
        };

        // Firebase Listeners
        onValue(ref(db, 'online'), (snapshot) => {
            const countEl = document.getElementById('online-count');
            if (countEl) countEl.innerText = snapshot.val() ? Object.keys(snapshot.val()).length : 0;
        });

        onValue(ref(db, 'initiative'), (snapshot) => updateInitiativeUI(snapshot.val()));

        onChildAdded(query(ref(db, 'rolls'), limitToLast(20)), (snapshot) => {
            const data = snapshot.val();
            if (!data || !canAnimate) return;

            const time = new Date(data.ts || Date.now()).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
            const stage = document.getElementById('dice-visual');
            const resultText = document.getElementById('result-text');
            const body = document.getElementById('main-body');

            document.getElementById('empty-state').style.display = 'none';
            stage.style.display = 'block';
            
            stage.classList.remove('shake', 'crit-glow');
            body.classList.remove('screen-shake');
            resultText.classList.remove('show');
            resultText.innerText = "";

            playRollSound(data.type, data.res, isMuted);
            
            if (data.type === 'd20' && data.res === 20) {
                stage.classList.add('crit-glow'); 
                body.classList.add('screen-shake');
            }

            stage.classList.add('shake');
            document.getElementById('dice-svg').innerHTML = diceShapes[data.type] || diceShapes.d20;
            document.getElementById('dice-svg').firstChild.style.fill = data.color;

            const maxVal = parseInt(data.type.replace('d', '')) || 20;
            const total = (data.res || 0) + (data.mod || 0);
            const flavorText = getFlavorText(data.type, data.res, total, maxVal);

            setTimeout(() => {
                stage.classList.remove('shake');
                resultText.innerText = total;
                resultText.classList.add('show');
                addLogEntry(data, time, flavorText);
            }, 600);
        });
    </script>
</body>
</html>
